[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Netlify Image Optimization
[[plugins]]
  package = "netlify-plugin-image-optim"

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# Netlify prerendering - Bot'lar için server-side render
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/rehber/*"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/fiyat-endeksi"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/clinic-dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/messages"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/profile"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
